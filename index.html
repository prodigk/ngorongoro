<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ngorongoro | Slow Forest Village</title>
  <meta
    name="description"
    content="응고롱고로의 정식 웹사이트 오픈 전까지 게시되는 임시 브랜드 랜딩페이지입니다."
  />
  <style>
    :root {
      --color-bg: #f7f4ef;
      --color-surface: rgba(255, 255, 255, 0.58);
      --color-green: #5a7a5e;
      --color-green-lt: #a8c5a3;
      --color-brown: #8b6e52;
      --color-text: #3a3530;
      --color-text-sub: #6f665d;
      --color-border: rgba(90, 122, 94, 0.18);
      --color-white: #ffffff;
      --shadow-soft: 0 30px 80px rgba(72, 59, 41, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      color: var(--color-text);
      background:
        radial-gradient(circle at top left, rgba(168, 197, 163, 0.34), transparent 34%),
        radial-gradient(circle at bottom right, rgba(139, 110, 82, 0.16), transparent 28%),
        linear-gradient(180deg, #fbf8f3 0%, var(--color-bg) 100%);
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    body::before,
    body::after {
      position: fixed;
      border-radius: 999px;
      content: "";
      pointer-events: none;
      filter: blur(8px);
    }

    body::before {
      top: -120px;
      left: -90px;
      width: 320px;
      height: 320px;
      background: rgba(168, 197, 163, 0.24);
    }

    body::after {
      right: -100px;
      bottom: -120px;
      width: 280px;
      height: 280px;
      background: rgba(139, 110, 82, 0.14);
    }

    .page {
      position: relative;
      width: min(100%, 760px);
      padding: 40px 28px;
    }

    .card {
      position: relative;
      border: 1px solid var(--color-border);
      border-radius: 28px;
      padding: 48px 28px 36px;
      text-align: center;
      background: var(--color-surface);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
      animation: rise 1s ease both;
    }

    .card::before {
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(90, 122, 94, 0.08);
      border-radius: 20px;
      content: "";
      pointer-events: none;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--color-green);
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 216px);
      margin-bottom: 26px;
      animation: fade 1.1s ease both;
    }

    .logo-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    h1 {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
      font-size: clamp(2.4rem, 7vw, 4.6rem);
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 0.96;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--color-brown);
      font-family: "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
      font-size: clamp(1rem, 2.9vw, 1.3rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .description {
      width: min(100%, 470px);
      margin: 24px auto 0;
      color: var(--color-text-sub);
      font-size: 1rem;
      line-height: 1.9;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 26px;
      padding: 10px 16px;
      border: 1px solid rgba(90, 122, 94, 0.18);
      border-radius: 999px;
      color: var(--color-green);
      background: rgba(255, 255, 255, 0.64);
      font-size: 0.9rem;
      letter-spacing: 0.02em;
    }

    .status::before {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--color-green);
      box-shadow: 0 0 0 6px rgba(168, 197, 163, 0.18);
      content: "";
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 32px;
    }

    .chip {
      padding: 10px 14px;
      border: 1px solid rgba(58, 53, 48, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--color-text-sub);
      font-size: 0.88rem;
    }

    .footer-note {
      margin-top: 30px;
      color: var(--color-text-sub);
      font-size: 0.83rem;
      letter-spacing: 0.04em;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .page {
        padding: 0;
      }

      .card {
        padding: 34px 20px 28px;
        border-radius: 22px;
      }

      .card::before {
        inset: 10px;
      }

      .description {
        font-size: 0.95rem;
        line-height: 1.8;
      }

      .meta {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-label="임시 브랜드 랜딩페이지">
      <p class="eyebrow">Temporary Landing Page</p>
      <div class="logo-wrap">
        <img src="./assets/images/logo_black.svg" alt="ngorongoro logo" />
      </div>
      <h1>ngorongoro</h1>
      <p class="subtitle">Slow Forest Village</p>
      <p class="description">
        응고롱고로의 정식 브랜드 웹사이트는 현재 준비 중입니다.
        이 페이지는 도메인 연결과 퍼블리싱 상태를 확인하기 위한 임시 랜딩페이지로,
        오픈 전까지 조용히 브랜드의 자리를 지키고 있습니다.
      </p>
      <div class="status">Domain connection ready</div>
      <div class="meta" aria-label="도메인 및 브랜드 정보">
        <span class="chip">ngorongoro.kr</span>
        <span class="chip">Brand site coming soon</span>
        <span class="chip">Static HTML publishing</span>
      </div>
      <p class="footer-note">© 2026 ngorongoro. All rights reserved.</p>
    </section>
  </main>
</body>
</html>
